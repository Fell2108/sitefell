<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Visual de Redes para Automação</title>
    <style>
        :root {
            --primary: #2b5797;
            --secondary: #00a300;
            --dark: #2d3748;
            --light: #f7fafc;
            --gray: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary), #1e3a8a);
            color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Sistema de Abas */
        .tab-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--gray);
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            color: #718096;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            color: var(--primary);
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 4px solid var(--primary);
            margin-bottom: -2px;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        /* Aba 1: Grid de Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        .card h3 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        /* Aba 2: Botões e Layout */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .action-btn {
            background-color: white;
            color: var(--dark);
            border: 2px solid var(--gray);
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover, .action-btn.active {
            background-color: var(--secondary);
            color: white;
            border-color: var(--secondary);
        }

        /* Caixa de Explicação Dinâmica */
        .info-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-top: 20px;
            border-left: 5px solid var(--primary);
        }

        .info-box h3 {
            margin-bottom: 15px;
            color: var(--dark);
        }

        .lists-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .list-block h4 {
            margin-bottom: 8px;
        }

        .text-success { color: #2f855a; }
        .text-danger { color: #c53030; }

        ul {
            padding-left: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Guia Visual de Redes para Automação</h1>
        <p>Entenda a infraestrutura de comunicação do chão de fábrica de forma simples.</p>
    </header>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab(event, 'cabos')">Cabos Industriais</button>
        <button class="tab-btn" onclick="switchTab(event, 'topologias')">Topologias</button>
    </div>

    <div id="cabos" class="tab-content active">
        <div class="cards-grid">
            <div class="card" onclick="showCabo('par-trancado')">
                <h3>Par Trançado</h3>
                <p>Clique para ver a aplicação</p>
            </div>
            <div class="card" onclick="showCabo('fibra-optica')">
                <h3>Fibra Óptica</h3>
                <p>Clique para ver a aplicação</p>
            </div>
            <div class="card" onclick="showCabo('wireless')">
                <h3>Wireless</h3>
                <p>Clique para ver a aplicação</p>
            </div>
        </div>

        <div id="cabo-info" class="info-box" style="display: none;">
            </div>
    </div>

    <div id="topologias" class="tab-content">
        <div class="btn-container">
            <button class="action-btn" onclick="showTopologia(event, 'estrela')">Layout em Estrela</button>
            <button class="action-btn" onclick="showTopologia(event, 'barramento')">Layout em Barramento</button>
        </div>

        <div id="topologia-info" class="info-box" style="display: none;">
            </div>
    </div>
