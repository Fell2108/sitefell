<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia Visual de Redes para Automação</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#eef3f8;
    color:#333;
}

header{
    background:#0b5ed7;
    color:white;
    padding:20px;
    text-align:center;
}

.tabs{
    display:flex;
    justify-content:center;
    margin:20px 0;
    gap:10px;
}

.tab-btn{
    padding:12px 20px;
    border:none;
    background:#d9d9d9;
    cursor:pointer;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.tab-btn.active{
    background:#0b5ed7;
    color:white;
}

.tab-content{
    display:none;
    padding:20px;
}

.tab-content.active{
    display:block;
}

.cards{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.card{
    background:white;
    width:220px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,.15);
    cursor:pointer;
    transition:.3s;
    text-align:center;
}

.card:hover{
    transform:translateY(-5px);
    background:#f4f9ff;
}

.info{
    margin-top:25px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
    min-height:80px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.layout-btn{
    padding:12px 18px;
    border:none;
    background:#198754;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.layout-btn:hover{
    background:#146c43;
}

ul{
    margin-left:20px;
    margin-top:10px;
}

h3{
    margin-bottom:10px;
}
</style>
</head>
<body>

<header>
    <h1>Guia Visual de Redes para Automação</h1>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="abrirAba('cabos', this)">
        Cabos Industriais
    </button>

    <button class="tab-btn" onclick="abrirAba('topologias', this)">
        Topologias
    </button>
</div>

<!-- ABA 1 -->

<div id="cabos" class="tab-content active">

<div class="cards">

<div class="card" onclick="mostrarCabo('par')">
<h3>Par Trançado</h3>
<p>Clique para saber mais.</p>
</div>

<div class="card" onclick="mostrarCabo('fibra')">
<h3>Fibra Óptica</h3>
<p>Clique para saber mais.</p>
</div>

<div class="card" onclick="mostrarCabo('wireless')">
<h3>Wireless</h3>
<p>Clique para saber mais.</p>
</div>

</div>

<div class="info" id="infoCabos">
Selecione um dos cabos para visualizar sua utilização na fábrica.
</div>

</div>

<!-- ABA 2 -->

<div id="topologias" class="tab-content">

<div class="buttons">

<button class="layout-btn" onclick="mostrarTopo('estrela')">
Layout em Estrela
</button>

<button class="layout-btn" onclick="mostrarTopo('barramento')">
Layout em Barramento
</button>

</div>

<div class="info" id="infoTopo">
Escolha um layout para visualizar as informações.
</div>

</div>

<script>

function abrirAba(id, botao){

document.querySelectorAll(".tab-content").forEach(t=>{
t.classList.remove("active");
});

document.querySelectorAll(".tab-btn").forEach(b=>{
b.classList.remove("active");
});

document.getElementById(id).classList.add("active");
botao.classList.add("active");

}

function mostrarCabo(tipo){

const info=document.getElementById("infoCabos");

if(tipo==="par"){

info.innerHTML=`
<h3>Par Trançado</h3>
<p>É muito usado para ligar CLPs, IHMs, switches e outros equipamentos próximos no chão de fábrica.</p>
`;

}

if(tipo==="fibra"){

info.innerHTML=`
<h3>Fibra Óptica</h3>
<p>É utilizada para conectar áreas maiores da fábrica, oferecendo alta velocidade e imunidade a interferências elétricas.</p>
`;

}

if(tipo==="wireless"){

info.innerHTML=`
<h3>Wireless</h3>
<p>É usado para conectar dispositivos móveis, coletores de dados, tablets e equipamentos onde o uso de cabos é difícil.</p>
`;

}

}

function mostrarTopo(tipo){

const info=document.getElementById("infoTopo");

if(tipo==="estrela"){

info.innerHTML=`
<h3>Layout em Estrela</h3>

<p>Todos os equipamentos são ligados a um switch central.</p>

<h4>Vantagens</h4>
<ul>
<li>Fácil de identificar falhas.</li>
<li>Boa organização.</li>
<li>Expansão simples.</li>
</ul>

<h4>Desvantagens</h4>
<ul>
<li>Usa mais cabos.</li>
<li>Depende do equipamento central.</li>
</ul>
`;

}

if(tipo==="barramento"){

info.innerHTML=`
<h3>Layout em Barramento</h3>

<p>Todos os equipamentos compartilham o mesmo cabo principal.</p>

<h4>Vantagens</h4>
<ul>
<li>Menor quantidade de cabos.</li>
<li>Instalação simples em redes pequenas.</li>
</ul>

<h4>Desvantagens</h4>
<ul>
<li>Uma falha pode afetar vários equipamentos.</li>
<li>Mais difícil localizar problemas.</li>
</ul>
`;

}

}

</script>

</body>
</html>
